services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    command: mongod --replSet rs0 --bind_ip_all
    healthcheck:
      test: >
        mongosh --eval "try { rs.status().ok } catch(e) { 0 }" --quiet | grep -q 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongodb_data:/data/db

  mongo-init:
    image: mongo:latest
    container_name: mongo-init
    depends_on:
      mongodb:
        condition: service_started
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        echo "Waiting for MongoDB to be ready..."
        for i in $$(seq 1 30); do
          if mongosh --host mongodb --eval "db.adminCommand('ping')" --quiet 2>/dev/null; then
            echo "MongoDB is ready!"
            break
          fi
          echo "Attempt $$i: MongoDB not ready yet, retrying in 2s..."
          sleep 2
        done
        mongosh --host mongodb --eval "
          try {
            rs.status();
            print('Replica set already initialized');
          } catch(e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] });
            print('Replica set initiated');
          }
        "

volumes:
  mongodb_data: